# ═══════════════════════════════════════════════════════════════
# samaramAI — Netlify Deployment Configuration
# ═══════════════════════════════════════════════════════════════

[build]
  # Build command for the Vite + React app
  command = "npm run build"
  # Output directory (Vite default)
  publish = "dist"

# SPA Routing — redirect all paths to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  # Proxy API requests to Render backend service
  from = "/api/*"
  to = "https://final-csp-1.onrender.com/:splat"
  status = 200
  force = true

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
